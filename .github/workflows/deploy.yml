name: Model Deployment

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ML Pipeline"]
    types: [completed]
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/olgas/ml-pipeline:${{ secrets.MODEL_VERSION }} -f controller/Dockerfile .

      - name: Run Docker container locally
        run: |
          docker stop my-app || true
          docker rm my-app || true
          docker run -d --name my-app -p 8080:80 ghcr.io/olgas/ml-pipeline:${{ secrets.MODEL_VERSION }}
          sleep 10
          docker ps --filter "name=my-app"

      - name: Wait and check local health
        run: |
          sleep 30
          curl -f http://localhost:8080/health || (echo "Health check failed. Check logs: docker logs my-app"; exit 1)

name: Model Deployment

on:
  workflow_run:
    workflows: ["ML Pipeline"]  
    types: [completed]
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ secrets.MODEL_VERSION }} .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}:${{ secrets.MODEL_VERSION }}

      - name: Deploy via API
        run: |
          curl -X POST https://api.cloudprovider/deploy \
            -H "Authorization: Bearer ${{ secrets.CLOUD_TOKEN }}" \
            -d "image=ghcr.io/${{ github.repository }}:${{ secrets.MODEL_VERSION }}"

      - name: Wait for deployment and check health
        run: |
          sleep 60  
          curl --retry 5 --retry-delay 10 -f https://your-app/health

version: '3.8'

services:
  ml-service-stable:
    build: .
    container_name: ml-service-stable
    ports:
      - "8000:8000"
    environment:
      - MODEL_VERSION=stable
      - PORT=8000
      - EXPOSE_METRICS=true
    command: python app.py --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ml-service-canary:
    build: .
    container_name: ml-service-canary
    ports:
      - "8001:8000"
    environment:
      - MODEL_VERSION=canary
      - PORT=8000
      - EXPOSE_METRICS=true
    command: python app.py --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  traefik:
    image: traefik:v2.9
    container_name: traefik-reverse-proxy
    ports:
      - "80:80"
      - "8080:8080"
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml-service.rule=Host(`localhost`)"
      - "traefik.http.routers.ml-service.entrypoints=web"
      - "traefik.http.routers.ml-service.service=ml-weighted"
      - "traefik.http.services.ml-weighted.weighted.services.stable.service=ml-service-stable"
      - "traefik.http.services.ml-weighted.weighted.services.stable.weight=9"
      - "traefik.http.services.ml-weighted.weighted.services.canary.service=ml-service-canary"
      - "traefik.http.services.ml-weighted.weighted.services.canary.weight=1"
      - "traefik.http.services.ml-service-stable.loadbalancer.server.port=8000"
      - "traefik.http.services.ml-service-canary.loadbalancer.server.port=8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-monitoring
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - ml-service-stable
      - ml-service-canary

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus-monitoring

  canary-controller:
    build:
      context: ./controller
      dockerfile: Dockerfile
    container_name: canary-controller
    environment:
      - TRAEFIK_API_URL=http://traefik:8080
      - STABLE_SERVICE=ml-service-stable
      - CANARY_SERVICE=ml-service-canary
      - ERROR_THRESHOLD=0.05
      - MONITOR_INTERVAL=60
    depends_on:
      - traefik

volumes:
  prometheus-data:
  grafana-data:

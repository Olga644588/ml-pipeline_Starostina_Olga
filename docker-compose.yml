services:
  traefik:
    image: traefik:v2.9
    container_name: traefik-reverse-proxy
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml  # Убираем docker.sock!
    command:
      - "--api.dashboard=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/dashboard`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.entrypoints=web"
    networks:
      - ml-network


  ml-service-stable:
    build: .
    container_name: ml-service-stable
    ports:
      - "8000:8000"
    environment:
      - MODEL_VERSION=stable
      - PORT=8000
    command: python app.py --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.ml-service-stable.loadbalancer.server.port=8000"
    networks:
      - ml-network

  ml-service-canary:
    build: .
    container_name: ml-service-canary
    ports:
      - "8001:8000"
    environment:
      - MODEL_VERSION=canary
      - PORT=8000
    command: python app.py --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.ml-service-canary.loadbalancer.server.port=8000"
    networks:
      - ml-network

  canary-controller:
    build: .
    container_name: canary-controller
    environment:
      - TRAEFIK_API_URL=http://traefik:8080
      - STABLE_SERVICE=ml-service-stable@docker
      - CANARY_SERVICE=ml-service-canary@docker
      - ERROR_THRESHOLD=0.05
      - MONITOR_INTERVAL=60
    depends_on:
      - traefik
    networks:
      - ml-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-monitoring
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ml-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
